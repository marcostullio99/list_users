<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tarefas {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <main class="app-shell">
        <header class="site-header">
            <a class="brand" href="{% url 'tarefas:lista' %}">
                <span class="brand-badge">TM</span>
                <span>
                    <p class="brand-title">Task Manager</p>
                    <p class="brand-subtitle">Organize suas entregas com clareza</p>
                </span>
            </a>
            <a class="btn btn-primary" href="{% url 'tarefas:criar' %}">Nova tarefa</a>
        </header>

        <section class="content">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
